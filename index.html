<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Crash Game</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-color: #151a26;
            --accent-purple: #7c4dff;
            --accent-green: #00e676;
            --accent-red: #ff1744;
            --text-color: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 900px;
            background: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .balance-box {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .balance-box span {
            color: var(--accent-green);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .history-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            max-width: 60%;
            padding-bottom: 5px;
        }

        .history-item {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
        }
        .history-green { color: var(--accent-green); }
        .history-red { color: var(--accent-red); }

        /* Main Game Area */
        .main-area {
            position: relative;
            height: 400px;
            background: radial-gradient(circle at center, #1e2538 0%, #0b0e14 100%);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .display-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        #multiplier {
            font-size: 5rem;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: color 0.2s;
        }

        #game-status {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            padding: 25px;
            gap: 20px;
            background: rgba(0, 0, 0, 0.1);
            align-items: center;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-purple);
        }

        .quick-buttons {
            position: absolute;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .quick-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .action-btn {
            flex: 1;
            height: 56px;
            margin-top: 25px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .btn-bet {
            background: var(--accent-purple);
            color: white;
        }
        .btn-bet:hover {
            background: #693ce6;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.4);
        }

        .btn-cashout {
            background: var(--accent-green);
            color: #000;
        }
        .btn-cashout:hover {
            background: #00c862;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        .btn-disabled {
            background: #2d3748 !important;
            color: var(--text-muted) !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }

        /* Message Box */
        .message-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--accent-green);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
            font-weight: 600;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="top-bar">
        <div class="history-container" id="history">
            </div>
        <div class="balance-box">
            Баланс: <span id="balance-display">1000.00</span> $
        </div>
    </div>

    <div class="main-area">
        <canvas id="gameCanvas"></canvas>
        <div class="display-overlay">
            <div id="multiplier">1.00x</div>
            <div id="game-status">Ожидание ставок</div>
        </div>
        <div class="message-box" id="win-message">Вы забрали: +0.00 $</div>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label for="bet-amount">Сумма ставки</label>
            <div class="input-wrapper">
                <input type="number" id="bet-amount" value="10" min="1" step="1">
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="adjustBet('X2')">X2</button>
                    <button class="quick-btn" onclick="adjustBet('MIN')">MIN</button>
                    <button class="quick-btn" onclick="adjustBet('MAX')">MAX</button>
                </div>
            </div>
        </div>
        <button class="action-btn btn-bet" id="action-button">Поставить ставку</button>
    </div>
</div>

<script>
    // Игровые Константы и Переменные
    let balance = 1000.00;
    let currentBet = 0;
    let hasBetThisRound = false;
    let cashedOutThisRound = false;
    
    // Переменные состояний игры: 'waiting', 'in_progress', 'crashed'
    let gameState = 'waiting'; 
    let currentMultiplier = 1.00;
    let crashPoint = 1.00;
    let startTime = null;
    let timeInRound = 0;
    let countdownTimer = 5; // Время ожидания между раундами (сек)
    let countdownStart = null;

    // Canvas элементы
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Элементы
    const multiplierDisplay = document.getElementById('multiplier');
    const statusDisplay = document.getElementById('game-status');
    const actionButton = document.getElementById('action-button');
    const balanceDisplay = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-amount');
    const historyContainer = document.getElementById('history');
    const winMessage = document.getElementById('win-message');

    // Массив для частиц (эффекты дыма и взрыва)
    let particles = [];

    // Настройка размеров Canvas
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Генерация точки краша (алгоритм приближен к реальным Crash играм)
    function generateCrashPoint() {
        const e = Math.random();
        // 3% шанс мгновенного краша на 1.00x
        if (e < 0.03) return 1.00;
        // Экспоненциальное распределение
        const point = 99 / (100 - Math.random() * 99);
        return Math.max(1.00, parseFloat(point.toFixed(2)));
    }

    // Класс частицы для эффектов
    class Particle {
        constructor(x, y, color, speedX, speedY, size, life) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.speedX = speedX;
            this.speedY = speedY;
            this.size = size;
            this.maxLife = life;
            this.life = life;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
        }
        draw(c) {
            c.save();
            c.globalAlpha = this.life / this.maxLife;
            c.fillStyle = this.color;
            c.beginPath();
            c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            c.fill();
            c.restore();
        }
    }

    // Функция обработки ввода ставок быстрых кнопок
    function adjustBet(type) {
        if (gameState === 'in_progress' && hasBetThisRound) return;
        let currentVal = parseFloat(betInput.value) || 0;
        if (type === 'X2') betInput.value = (currentVal * 2).toFixed(0);
        if (type === 'MIN') betInput.value = 10;
        if (type === 'MAX') betInput.value = Math.floor(balance);
        validateBetInput();
    }

    function validateBetInput() {
        let val = parseFloat(betInput.value);
        if (val > balance) betInput.value = Math.floor(balance);
        if (val < 1) betInput.value = 1;
    }
    betInput.addEventListener('input', validateBetInput);

    // Логика клика по главной кнопке
    actionButton.addEventListener('click', () => {
        if (gameState === 'waiting') {
            if (!hasBetThisRound) {
                let bet = parseFloat(betInput.value);
                if (bet > 0 && bet <= balance) {
                    currentBet = bet;
                    balance -= currentBet;
                    hasBetThisRound = true;
                    updateUI();
                }
            } else {
                // Отмена ставки до начала раунда
                balance += currentBet;
                currentBet = 0;
                hasBetThisRound = false;
                updateUI();
            }
        } else if (gameState === 'in_progress' && hasBetThisRound && !cashedOutThisRound) {
            // Кэшаут во время игры
            let winAmount = currentBet * currentMultiplier;
            balance += winAmount;
            cashedOutThisRound = true;
            
            winMessage.innerText = `Вы забрали: +${winAmount.toFixed(2)} $`;
            winMessage.style.display = 'block';
            setTimeout(() => winMessage.style.opacity = '0', 2000);
            setTimeout(() => { winMessage.style.display = 'none'; winMessage.style.opacity = '1'; }, 2300);

            updateUI();
        }
    });

    // Обновление интерфейса кнопок и текстов
    function updateUI() {
        balanceDisplay.innerText = balance.toFixed(2);
        
        if (gameState === 'waiting') {
            betInput.removeAttribute('disabled');
            if (hasBetThisRound) {
                actionButton.innerText = "Отменить ставку";
                actionButton.className = "action-btn btn-cashout"; // оранжево/красный стиль отмены
                actionButton.style.background = "#ff9100";
            } else {
                actionButton.innerText = "Поставить ставку";
                actionButton.className = "action-btn btn-bet";
                actionButton.style.background = "";
            }
        } else if (gameState === 'in_progress') {
            betInput.setAttribute('disabled', 'true');
            if (hasBetThisRound && !cashedOutThisRound) {
                let currentWin = (currentBet * currentMultiplier).toFixed(2);
                actionButton.innerText = `Забрать ${currentWin} $`;
                actionButton.className = "action-btn btn-cashout";
                actionButton.style.background = "";
            } else if (cashedOutThisRound) {
                actionButton.innerText = "Ставка принята (Выиграна)";
                actionButton.className = "action-btn btn-disabled";
            } else {
                actionButton.innerText = "Игра в процессе...";
                actionButton.className = "action-btn btn-disabled";
            }
        } else if (gameState === 'crashed') {
            betInput.setAttribute('disabled', 'true');
            actionButton.innerText = "КРАШ!";
            actionButton.className = "action-btn btn-disabled";
        }
    }

    // Добавление плашки в историю раундов
    function addToHistory(value) {
        const item = document.createElement('div');
        item.className = `history-item ${value >= 2.00 ? 'history-green' : 'history-red'}`;
        item.innerText = value.toFixed(2) + 'x';
        historyContainer.prepend(item);
        
        if (historyContainer.children.length > 8) {
            historyContainer.removeChild(historyContainer.lastChild);
        }
    }

    // Инициализация начала фазы ожидания нового раунда
    function startWaitingPhase() {
        gameState = 'waiting';
        currentMultiplier = 1.00;
        multiplierDisplay.style.color = 'var(--text-color)';
        statusDisplay.innerText = "Ожидание ставок";
        countdownStart = Date.now();
        crashPoint = generateCrashPoint();
        cashedOutThisRound = false;
        hasBetThisRound = currentBet > 0; // если автоставка или была перенесена
        if(!hasBetThisRound) currentBet = 0;
        else {
             // если ставка осталась с прошлого раза и баланса хватает
             if(balance < currentBet) {
                 currentBet = 0;
                 hasBetThisRound = false;
             } else {
                 balance -= currentBet;
             }
        }
        particles = [];
        updateUI();
    }

    // Старт самого полета графика
    function startRound() {
        gameState = 'in_progress';
        startTime = Date.now();
        statusDisplay.innerText = "Ракеты летит...";
        updateUI();
    }

    // Триггер падения (Краш)
    function triggerCrash() {
        gameState = 'crashed';
        multiplierDisplay.style.color = 'var(--accent-red)';
        statusDisplay.innerText = `Взрыв на ${crashPoint.toFixed(2)}x`;
        addToHistory(crashPoint);

        // Создаем взрывные частицы
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        const targetX = 100 + (w - 200) * Math.min(1, timeInRound / 10);
        const targetY = (h - 80) - (h - 150) * Math.min(1, (currentMultiplier - 1) / 5);

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle(
                targetX, 
                targetY, 
                Math.random() > 0.5 ? 'var(--accent-red)' : '#ffaa00',
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8,
                Math.random() * 4 + 2,
                Math.random() * 40 + 20
            ));
        }

        hasBetThisRound = false; 
        currentBet = 0;

        setTimeout(() => {
            startWaitingPhase();
        }, 3500); // пауза перед некст раундом
    }

    // Основной цикл отрисовки анимации и логики
    function gameLoop() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.clearRect(0, 0, w, h);

        // Отрисовка динамической сетки на фоне
        drawGrid(w, h);

        if (gameState === 'waiting') {
            let elapsed = (Date.now() - countdownStart) / 1000;
            let remaining = Math.max(0, countdownTimer - elapsed);
            multiplierDisplay.innerText = `${remaining.toFixed(1)}s`;
            
            if (remaining <= 0) {
                startRound();
            }
        }

        if (gameState === 'in_progress') {
            timeInRound = (Date.now() - startTime) / 1000;
            
            // Магическая формула роста иксов (плавное ускорение)
            currentMultiplier = Math.pow(Math.E, 0.065 * timeInRound);
            
            multiplierDisplay.innerText = `${currentMultiplier.toFixed(2)}x`;

            if (hasBetThisRound && !cashedOutThisRound) {
                updateUI(); // Обновляем выигрыш на кнопке в реальном времени
            }

            if (currentMultiplier >= crashPoint) {
                currentMultiplier = crashPoint;
                multiplierDisplay.innerText = `${currentMultiplier.toFixed(2)}x`;
                triggerCrash();
            }

            // Отрисовка траектории полета
            drawGraph(w, h);
        }

        if (gameState === 'crashed') {
            drawGraph(w, h); // рисуем застывший график
        }

        // Обновление и отрисовка спецэффектов (частиц)
        particles.forEach((p, idx) => {
            p.update();
            p.draw(ctx);
            if (p.life <= 0) particles.splice(idx, 1);
        });

        requestAnimationFrame(gameLoop);
    }

    // Функция рисования сетки координат
    function drawGrid(w, h) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        let step = 40;
        
      // Смещение сетки влево для имитации движения вперед
        let offset = 0;
        if (gameState === 'in_progress') {
            offset = (timeInRound * 20) % step;
        }

        for (let x = 0 - offset; x < w; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h - 40);
            ctx.stroke();
        }
        for (let y = 0; y < h - 40; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
        }

        // Нижняя линия оси X
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, h - 40);
        ctx.lineTo(w, h - 40);
        ctx.stroke();
    }

    // Функция отрисовки графика ракеты и следа
    function drawGraph(w, h) {
        let startX = 60;
        let startY = h - 40;
        
        // Вычисляем текущие координаты вершины графика на основе прогресса
        let progressX = Math.min(1, timeInRound / 12); 
        let progressY = Math.min(1, (currentMultiplier - 1) / 6);

        let targetX = startX + (w - startX - 80) * progressX;
        let targetY = startY - (startY - 80) * progressY;

        // Рисуем неоновую линию графика
        ctx.save();
        ctx.strokeStyle = gameState === 'crashed' ? 'var(--accent-red)' : 'var(--accent-purple)';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.strokeStyle;
        
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        // Плавная кривая Безье
        ctx.quadraticCurveTo((startX + targetX)/1.4, startY, targetX, targetY);
        ctx.stroke();
        ctx.restore();

        // Заполнение пространства под графиком красивым градиентом
        ctx.save();
        let gradient = ctx.createLinearGradient(0, targetY, 0, startY);
        gradient.addColorStop(0, gameState === 'crashed' ? 'rgba(255, 23, 68, 0.2)' : 'rgba(124, 77, 255, 0.2)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo((startX + targetX)/1.4, startY, targetX, targetY);
        ctx.lineTo(targetX, startY);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Генерируем искры/дым из сопла ракеты во время полета
        if (gameState === 'in_progress' && Math.random() > 0.3) {
            particles.push(new Particle(
                targetX, 
                targetY, 
                'rgba(140, 100, 255, 0.6)', 
                -Math.random() * 2 - 1, 
                Math.random() * 2 - 1, 
                Math.random() * 3 + 1, 
                30
            ));
        }

        // Рисуем светящуюся точку ("Ракету") на конце графика
        if (gameState === 'in_progress') {
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'var(--accent-purple)';
            ctx.beginPath();
            ctx.arc(targetX, targetY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Первичный запуск игры
    startWaitingPhase();
    gameLoop();
</script>

</body>
</html>
